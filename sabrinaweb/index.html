<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual Sabrina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="textArea" class="text-area">Introduce la contraseña para acceder al asistente:</div>
        <input type="text" id="inputField" class="input-field" />
        <button id="submitButton" class="button">Enviar</button>
        <button id="playButton" class="button">Jugar</button>
        <button id="modeButton" class="button">Modo Difícil</button>
        <button id="calculatorButton" class="button">Calculadora</button>
        <button id="leaderboardButton" class="button">Clasificación</button>
        <button id="exitButton" class="button">Salir</button>
        <input type="text" id="ratingField" class="input-field" placeholder="10" />
        <input type="text" id="feedbackField" class="input-field" placeholder="Críticas" />
        <button id="saveButton" class="button">Guardar Resultados</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
